name: Bug report
description: Something is broken or behaves unexpectedly.
title: "[Bug] "
labels:
  - "bug"
  - "needs-triage"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in
        as much detail as you can — reproductions in particular
        save a lot of back-and-forth.

        For security vulnerabilities, **do not file a public issue.**
        See [SECURITY.md](../blob/main/SECURITY.md).

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: |
        Minimal, ordered steps. A repo or code snippet that
        reproduces the issue is ideal.
      placeholder: |
        1. Run `pnpm dev`
        2. Open http://localhost:5173
        3. Click "..."
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages, stack traces, screenshots.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Branch and commit hash, or release tag.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - app (frontend)
        - api (backend)
        - supabase / database
        - build / tooling
        - docs
        - other
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This is not a security vulnerability.
          required: true
