name: Feature request
description: Propose a new feature, capability, or improvement.
title: "[Feature] "
labels:
  - "enhancement"
  - "needs-triage"
body:
  - type: markdown
    attributes:
      value: |
        Please describe the problem first, then the proposal. BLUE
        is a mission-driven project with non-negotiable principles.
        Proposals that violate those principles will not be accepted.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need or pain point does this address?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What do you want to build or change?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - app (frontend)
        - api (backend)
        - supabase / database
        - verifier system
        - content pipeline
        - governance / policy
        - docs
        - other
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
