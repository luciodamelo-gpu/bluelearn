name: Guide / content proposal
description: Propose a new educational guide, a new method inside an existing guide, or a hierarchy structure.
title: "[Guide] "
labels:
  - "content"
  - "needs-triage"
body:
  - type: markdown
    attributes:
      value: |
        BLUE's content pipeline (verifier juries, post-publish
        moderation, hierarchies, methods, disputes) is still being
        designed. Until the in-platform flow ships, use this template
        to propose guide structure, prerequisites, and content shape —
        not to submit final prose.

  - type: input
    id: subject
    attributes:
      label: Subject
      description: e.g. "Electronics", "Cellular biology", "Welding".
    validations:
      required: true

  - type: input
    id: level
    attributes:
      label: Level
      description: |
        Hierarchy level. 1 = atomic primitives (build a transistor,
        how a cell works). Higher = compositions of lower.
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: Learner outcome
      description: |
        After completing this guide, the learner will be able to
        *do* what, specifically? Be concrete and behavioral.
    validations:
      required: true

  - type: textarea
    id: prerequisites
    attributes:
      label: Prerequisites
      description: |
        List the lower-level guides this depends on. Remember: a
        level-N guide must be completable using only level <N
        content. No skipped steps. If a prerequisite does not yet
        exist on BLUE, note that.
    validations:
      required: true

  - type: textarea
    id: methods
    attributes:
      label: Methods (alternative approaches)
      description: |
        If multiple valid approaches exist, list them. Each will
        become a method inside the canonical guide.
    validations:
      required: false

  - type: textarea
    id: licensing
    attributes:
      label: Source and licensing
      description: |
        Is this original work? If you're adapting from another
        source, link it and confirm the source is compatibly
        licensed (CC BY-SA 4.0 compatible, or your own work).
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmations
      options:
        - label: I understand BLUE's hierarchy and methods model.
          required: true
        - label: I will license this content under CC BY-SA 4.0.
          required: true
        - label: I have searched for an existing canonical guide on this topic.
          required: true
